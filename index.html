<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EDA Monitoring System</title>
    <script>
      // Defensive fix for "Cannot set property fetch of #<Window> which has only a getter"
      // Some environments/libraries try to polyfill fetch even if it already exists as a read-only property.
      try {
        if (typeof window !== 'undefined' && window.fetch) {
          const desc = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (desc && !desc.writable && desc.configurable) {
            Object.defineProperty(window, 'fetch', {
              value: window.fetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        }
      } catch (e) {
        console.warn('Defensive fetch check failed:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
